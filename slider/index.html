<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GSAP Horizontal Loop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="button-cont">
    <button class="prev">prev</button>
    <button class="toggle">toggle overflow</button>
    <button class="next">next</button>
  </div>

  <div class="wrapper">
    <div class="box">
      <div class="box__inner"><p>1</p></div>
    </div>
    <div class="box">
      <div class="box__inner"><p>2</p></div>
    </div>
    <div class="box">
      <div class="box__inner"><p>3</p></div>
    </div>
    <div class="box">
      <div class="box__inner"><p>4</p></div>
    </div>
    <div class="box" style="width:350px">
      <div class="box__inner"><p>5</p></div>
    </div>
    <div class="box">
      <div class="box__inner"><p>6</p></div>
    </div>
    <div class="box">
      <div class="box__inner"><p>7</p></div>
    </div>
    <div class="box">
      <div class="box__inner"><p>8</p></div>
    </div>
    <div class="box">
      <div class="box__inner"><p>9</p></div>
    </div>
    <div class="box">
      <div class="box__inner"><p>10</p></div>
    </div>
    <div class="box">
      <div class="box__inner"><p>11</p></div>
    </div>
  </div>

  <!-- GSAP core + Draggable (free) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
