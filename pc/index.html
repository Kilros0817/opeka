<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GSAP ScrollTrigger demo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="pin-section">
      <div class="content--twin">
        <div class="twin__cols">

          <div class="twin__panel twin__panel--left">
            <div class="card-label">В каждом пансионате<br>вас ожидают</div>
            <div class="slide-counter" aria-live="polite">
              <span class="slide-counter__current">01</span>
              <span class="slide-counter__sep"> — </span>
              <span class="slide-counter__total">04</span>
            </div>
            <div class="twin__slides">
              <div class="slide center gradient-green"><h1>SLIDE ONE</h1></div>
              <div class="slide center gradient-blue"><h1>SLIDE TWO</h1></div>
              <div class="slide center gradient-purple"><h1>SLIDE THREE</h1></div>
              <div class="slide center gradient-orange"><h1>SLIDE FOUR</h1></div>
            </div>
            <nav class="scroll-progress" aria-label="Slide progress">
              <div class="scroll-progress__clip">
                <ul class="scroll-progress__steps" role="list">
                  <li class="scroll-progress__step is-active">
                    <button class="scroll-progress__btn" type="button">
                      <span class="scroll-progress__line" aria-hidden="true"></span>
                      <span class="scroll-progress__label">Квалифицированный персонал</span>
                    </button>
                  </li>
                  <li class="scroll-progress__step">
                    <button class="scroll-progress__btn" type="button">
                      <span class="scroll-progress__line" aria-hidden="true"></span>
                      <span class="scroll-progress__label">Медицинские услуги</span>
                    </button>
                  </li>
                  <li class="scroll-progress__step">
                    <button class="scroll-progress__btn" type="button">
                      <span class="scroll-progress__line" aria-hidden="true"></span>
                      <span class="scroll-progress__label">Комфорт и досуг</span>
                    </button>
                  </li>
                  <li class="scroll-progress__step">
                    <button class="scroll-progress__btn" type="button">
                      <span class="scroll-progress__line" aria-hidden="true"></span>
                      <span class="scroll-progress__label">Безопасность</span>
                    </button>
                  </li>
                </ul>
              </div>
            </nav>
          </div>

          <div class="twin__panel twin__panel--right">
            <div class="twin__slides">
              <div class="slide slide--photo">
                <img class="slide__img" src="images/1.jpg" alt="Image 01" />
              </div>
              <div class="slide slide--photo">
                <img class="slide__img" src="images/2.png" alt="Image 02" />
              </div>
              <div class="slide slide--photo">
                <img class="slide__img" src="images/3.jpg" alt="Image 03" />
              </div>
              <div class="slide slide--photo">
                <img class="slide__img" src="images/4.png" alt="Image 04" />
              </div>
            </div>
          </div>

        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
