<script props>
  /*
   * x-promo-mini-card
   *
   * Promotion card: tag + title + description + text-link, with a decorative blob.
   * Composes <x-tag> and <x-text-link> internally.
   *
   * Props (shell):
   *   tag-color — color for the <x-tag> (default: red)
   *   tag-icon — sprite id for the <x-tag> (default: fire)
   *   link-href — href for the CTA link (default: #)
   *   link-icon — sprite id for the link icon (default: plus)
   *
   * Slots:
   *   <fill-tag>   — tag label
   *   <fill-title> — card title (rendered in <h3>)
   *   <fill-desc>  — card description (rendered in <p>)
   *   <fill-link>  — CTA link label
   *
   * Blob color — override CSS var `--promo-mini-card-blob` from the outside.
   */
  const tagColor = props['tag-color'] || 'red'
  const tagIcon = props['tag-icon'] || 'fire'
  const linkHref = props['link-href'] || '#'
  const linkIcon = props['link-icon'] || 'plus'

  module.exports = { tagColor, tagIcon, linkHref, linkIcon }
</script>

<article class="promo-mini-card">
  <div class="promo-mini-card__bg" aria-hidden="true"></div>
  <div class="promo-mini-card__content">
    <x-tag size="sm" color="{{ tagColor }}" icon="{{ tagIcon }}"><slot-tag></slot-tag></x-tag>
    <div class="promo-mini-card__body">
      <div class="promo-mini-card__text">
        <h3 class="promo-mini-card__title"><slot-title></slot-title></h3>
        <p class="promo-mini-card__desc"><slot-desc></slot-desc></p>
      </div>
      <x-text-link href="{{ linkHref }}" color="blue" icon="{{ linkIcon }}"><slot-link></slot-link></x-text-link>
    </div>
  </div>
</article>
