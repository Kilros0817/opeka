<script props>
  /*
   * x-room-card
   *
   * Room card: tag + title + description + image + price + unit
   * Composes <x-number-of-seats>.
   *
   * Props (shell):
   *   seat-icon - use <x-number-of-seats>
   *   src_main_back - imgae src
   *   src_main_middle - imgae src
       src_main_front - imgae src
       alt_back - imgae alt
       alt_middle - imgae alt
       alt_front - imgae alt
   * Slots:
   *   <fill-tag>   — tag label
   *   <fill-title> — card title (rendered in <h3>)
   *   <fill-desc>  — card description (rendered in <p>)
   *   <fill-price> - card price 
   *   <fill-unit>  - card unit
   *   
   *
   * Blob color — override CSS var `--promo-mini-card-blob` from the outside.
   */
  const seat = props.seat || '1'
  const src_main_back = props.src_main_back || ""
  const src_main_middle = props.src_main_middle || ""
  const src_main_front = props.src_main_front || ""
  const alt_back = props.alt_back || ""
  const alt_middle = props.alt_middle || ""
  const alt_front = props.alt_front || ""


  module.exports = { seat, src_main_back, alt_back, src_main_middle, alt_middle, src_main_front, alt_front }

</script>
<section class="room-card">
  <div class="room-card__content">
    <!-- Seats -->
    <x-number-of-seats count="{{seat}}" ></x-number-of-seats>
    <!-- Text -->
    <div class="room-card__text">
      <h3 class="room-card__title"><slot-title></slot-title></h3>
      <p class="room-card__description truncate-2-lines">
        <slot-desc></slot-desc>
      </p>
    </div>
  </div>
  <!-- Image stack -->
  <div class="room-card__images">
    <img class="room-card__image room-card__image--back" alt="alt_back" src="{{src_main_back}}" />
    <img class="room-card__image room-card__image--middle" alt="alt_middle" src="{{src_main_middle}}" />
    <img class="room-card__image room-card__image--front" alt="alt_front" src="{{src_main_front}}" />
  </div>
  <!-- Footer -->
  <div class="room-card__footer">
    <div class="room-card__price">
      <span class="room-card__price-value"><slot-price></slot-price></span>
      <span class="room-card__price-unit"><slot-unit></slot-unit></span>
    </div>
    <button class="room-card__button">
      <svg class="icon-plus" aria-hidden="true">
        <use href="#icon-plus" />
      </svg>
    </button>
  </div>
</section>
