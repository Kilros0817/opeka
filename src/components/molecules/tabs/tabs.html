<script props>
  /*
   * x-tabs
   *
   * Props:
   *   aria-label — accessible name for the tabs (default: Акции)
   *
   * Children (yield):
   *   One <x-tab type="black" status="default"> per tab.
   */
  const ariaLabel = props['aria-label'] || 'Акции'

  module.exports = { ariaLabel }
</script>

<div class="tabs" aria-label="{{ ariaLabel }}">
  <yield></yield>
</div>
