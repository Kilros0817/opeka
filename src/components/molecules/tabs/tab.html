<script props>
  /*
   * x-tab
   *
   * Props:
   *   type      — black | white | non-border (default: black)
   *   isactive  — true | false (default: false)
   */

  const isactive = props['isactive'] ? 'active' : 'default';

  module.exports = {
    type, isactive,
  }
</script>

<div class="tab">
  <span class="tab--{{ isactive }}">
    <yield></yield>
  </span>
</div>
