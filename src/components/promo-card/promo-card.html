<aside class="promo-card">
  <div class="promo-card__frame">
    <div class="promo-card__frost promo-card__frost--back" aria-hidden="true"></div>
    <div class="promo-card__frost promo-card__frost--mid" aria-hidden="true"></div>
    <div class="promo-card__surface">
      <div class="promo-card__glow" aria-hidden="true"></div>
      <div class="promo-card__head">
        <div class="tag">
          <span class="tag__icon" aria-hidden="true">✦</span>
          <span class="tag__text">Скидка 20%</span>
        </div>
      </div>
      <div class="promo-card__body">
        <div class="promo-card__text">
          <h2 class="promo-card__title">Зимний чек-ап в "Опеке"</h2>
          <p class="promo-card__desc">14 дней восстановления здоровья по сниженной цене.</p>
        </div>
        <a class="text-link" href="#">
          <span class="text-link__icon" aria-hidden="true">+</span>
          <span class="text-link__label">Узнать больше</span>
        </a>
      </div>
      <div class="promo-card__footer">
        <div class="pager promo-card__pager" role="tablist" aria-label="Слайды">
          <button type="button" class="pager__dot pager__dot--active" role="tab" aria-selected="true"></button>
          <div class="pager__track" aria-hidden="true"><div class="pager__track-fill"></div></div>
          <button type="button" class="pager__dot" role="tab" aria-selected="false"></button>
          <button type="button" class="pager__dot" role="tab" aria-selected="false"></button>
        </div>
        <div class="promo-card__arrows">
          <button type="button" class="btn btn--circle" aria-label="Назад"><span class="btn__icon">‹</span></button>
          <button type="button" class="btn btn--circle" aria-label="Вперед"><span class="btn__icon">›</span></button>
        </div>
      </div>
    </div>
  </div>
</aside>
