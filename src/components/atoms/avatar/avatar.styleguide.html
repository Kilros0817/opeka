<!-- x-avatar showcase. Include in styleguide/components.html -->
<section class="sg-section" id="comp-avatar" data-nav-target>
  <h2 class="sg-section__title">Avatar</h2>
  <p class="sg-section__desc">
    Проп <code>src_main</code> — путь к изображению переднего плана (опционально).
    Проп <code>size</code>: <code>sm</code>, <code>md</code>, <code>lg</code>, <code>xl</code>.
    Проп <code>bg_type</code>: <code>gradient</code>, <code>solid</code>, <code>image</code>.
    Пропы <code>bg_from</code> и <code>bg_to</code> — цвета градиента.
    Проп <code>bg_img</code> — путь к фоновому изображению.
  </p>

  <div class="sg-matrix sg-matrix--narrow">
    <div class="sg-matrix__head">
      <div class="sg-cell"><x-avatar image-url="../../assets/images/avatar-01.webp" alt="avatar" size="sm"></x-avatar></div>
      <div class="sg-cell"><x-avatar image-url="../../assets/images/avatar-01.webp" alt="avatar" size="md"></x-avatar></div>
      <div class="sg-cell"><x-avatar image-url="../../assets/images/avatar-01.webp" alt="avatar" size="lg"></x-avatar></div>
      <div class="sg-cell"><x-avatar image-url="../../assets/images/avatar-01.webp" alt="avatar" size="xl"></x-avatar></div>
    </div>
  </div>

  <sg-snippet title="x-avatar">
    <x-avatar image-url="../../assets/images/avatar-01.webp" alt="avatar" size="sm"></x-avatar>
  </sg-snippet>

</section>
