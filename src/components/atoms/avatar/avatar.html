<script props>
    /*
     * x-avatar
     *
     * Props:
     *   image-url - foreground image URL (optional)
     *   alt       - image alt text (default: 'avatar')
     *   size      - sm | md | lg | xl (default: sm)
     *   bg-color  - solid background color (optional, default: blue gradient from CSS)
     */

    const imageUrl = props['image-url'] || ''
    const alt      = props.alt || 'avatar'
    const size     = props.size || 'sm'
    const bgColor  = props['bg-color'] || ''

    module.exports = {
        imageUrl,
        alt,
        cls: ['avatar', 'avatar--' + size].join(' '),
    }
</script>

<div class="{{ cls }}">
    <if condition="imageUrl">
        <img
            src="{{ imageUrl }}"
            alt="{{ alt }}"
            loading="lazy"
            class="avatar__img"
        >
    </if>
</div>
