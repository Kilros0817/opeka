<script props>
    /*
     * x-avatar
     *
     * Props:
     *   image-url  - foreground image URL (default: '')
     *   alt       - image alt text (default: 'avatar')
     *   size      - sm | md | lg | xl (default: sm)
     *   bg_type   - gradient | solid | image (default: gradient)
     *   bg_from   - gradient start color or solid color (default: '')
     *   bg_to     - gradient end color, gradient only (default: '')
     *   bg_img    - background image URL, image type only (default: '')
     */

    const imageUrl = props['image-url'] || '';
    const alt = props.alt || 'avatar';
    const size = props.size || 'sm';
    const bg_type = props.bg_type || 'gradient';
    const bg_from = props.bg_from || 'rgba(227,232,255,1)';
    const bg_to = props.bg_to || 'rgba(158,182,214,1)';
    const bg_img = props.bg_img || '';

    module.exports = {
        imageUrl,
        alt,
        bg_type,
        bg_from,
        bg_to,
        bg_img,
        cls: [
            'avatar',
            'avatar--' + size,
            'avatar--' + bg_type,
        ].join(' '),
    }
</script>

<div
    class="{{ cls }}"
    data-avatar
    data-bg-type="{{ bg_type }}"
    data-bg-from="{{ bg_from }}"
    data-bg-to="{{ bg_to }}"
    data-bg-img="{{ bg_img }}"
>
    <if condition="imageUrl">
        <img
            src="{{ imageUrl }}"
            alt="{{ alt }}"
            loading="lazy"
            class="avatar__img"
        >
    </if>
</div>
