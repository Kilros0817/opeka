<!-- x-button-circle showcase. Include in styleguide/components.html -->

<section class="sg-section" id="comp-button-circle" data-nav-target>
    <h2 class="sg-section__title">Circle Button</h2>
    <p class="sg-section__desc">
        Размеры: <code>mini</code> (34), <code>medium</code> (46).
        Цвета: <code>tr-grey</code>, <code>tr-white</code>, <code>white</code>, <code>tr-grey-white</code>, <code>tr-blue</code>.
    </p>

    <div class="sg-matrix">
        <div class="sg-matrix__head">
            <span></span>
            <span class="sg-state-label">Default</span>
            <span class="sg-state-label">Hover</span>
            <span class="sg-state-label">Disabled</span>
        </div>

        <div class="sg-matrix__row">
            <span class="sg-variant-label">Tr Grey</span>
            <div class="sg-cell"><x-button-circle variant="tr-grey" size="mini"
                    icon="chevron-left"></x-button-circle></div>
            <div class="sg-cell"><x-button-circle variant="tr-grey" size="mini" class="is-hover"
                    icon="chevron-left"></x-button-circle></div>
            <div class="sg-cell"><x-button-circle variant="tr-grey" size="mini"
                    icon="chevron-left" class="is-hover" disabled></x-button-circle>
            </div>
        </div>

        <div class="sg-matrix__row">
            <span class="sg-variant-label"></span>
            <div class="sg-cell"><x-button-circle variant="tr-grey" size="medium"
                    icon="chevron-left"></x-button-circle></div>
            <div class="sg-cell"><x-button-circle variant="tr-grey" size="medium" class="is-hover"
                    icon="chevron-left"></x-button-circle></div>

            <div class="sg-cell"><x-button-circle variant="tr-white" size="mini"
                    icon="chevron-left" class="is-hover" disabled></x-button-circle></div>
        </div>

        <div class="sg-matrix__row">
            <span class="sg-variant-label"></span>
