<!-- x-circle-button showcase. Include in styleguide/components.html -->

<section class="sg-section" id="comp-button-icon" data-nav-target>
    <h2 class="sg-section__title">Circle Button</h2>
    <p class="sg-section__desc">
        No label, icon only. Requires <code>aria-label</code>.
        Variants: <code>tr-blue</code> <code>tr-grey</code>, <code>tr-grey-white</code>, <code>tr-white</code>.
    </p>

    <div class="sg-matrix">

            <span class="sg-state-label">Hover</span>
            <span class="sg-state-label">Disabled</span>
        </div>

        <div class="sg-matrix__row">
            <span class="sg-variant-label">Tr Grey</span>
            <div class="sg-cell"><x-circle-button variant="tr-grey" class="btn btn--mini btn--tr-grey" icon="chevron-left" pill
                    aria-label="Назад"></x-circle-button></div>
            <div class="sg-cell"><x-circle-button variant="tr-grey" class="btn btn--mini btn--tr-grey is-hover"
                    icon="chevron-left" pill aria-label="Назад"></x-circle-button></div>
            <div class="sg-cell"><x-circle-button variant="tr-grey" class="btn btn--mini btn--tr-grey" icon="chevron-left" pill
                    class="is-hover" disabled aria-label="Назад"></x-circle-button></div>
        </div>

        <div class="sg-matrix__row">
