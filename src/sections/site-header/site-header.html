<!-- .site-header -->
<header class="site-header">
  <!-- Top bar -->
  <div class="site-header__top">
    <nav class="site-header__top-list site-header__top-list--desktop" aria-label="Служебная навигация">
      <x-text-link href="#" size="sm" color="grey" icon="eye">Версия для слабовидящих</x-text-link>
      <x-text-link href="#" size="sm" color="grey">Госпрограмма</x-text-link>
      <x-text-link href="#" size="sm" color="grey">Доступная среда</x-text-link>
      <x-text-link href="#" size="sm" color="grey">О компании</x-text-link>
      <x-text-link href="#" size="sm" color="grey">Реквизиты</x-text-link>
      <x-text-link href="#" size="sm" color="grey">Информация о поставщике услуг</x-text-link>
    </nav>

    <div class="site-header__top-meta">
      <x-text-link size="sm" color="grey" icon="chevron-down" icon-pos="right" aria-haspopup="true" aria-expanded="false">8 (499) 370-49-78</x-text-link>
      <x-text-link size="sm" color="grey" icon="chevron-down" icon-pos="right" aria-haspopup="true" aria-expanded="false">Санкт-Петербург</x-text-link>
    </div>
  </div>

  <!-- Main bar -->
  <div class="site-header__main">
    <div class="site-header__brand">
      <a href="/" class="site-header__logo" aria-label="Опека — на главную">
        <svg class="site-header__logo-mark" width="54" height="33" viewBox="0 0 54 33" aria-hidden="true">
          <use href="#icon-logo-bird" />
        </svg>
        <span class="site-header__logo-text">Опека</span>
      </a>

      <nav class="site-header__nav site-header__nav--desktop" aria-label="Основная навигация">
        <x-button variant="blue" aria-controls="main-menu" aria-expanded="false">Меню</x-button>
        <x-button href="#" variant="tr-grey" icon="chevron-down" aria-haspopup="true" aria-expanded="false">Пансионаты</x-button>
        <x-button href="#" variant="tr-grey" icon="chevron-down" aria-haspopup="true" aria-expanded="false">Направления</x-button>
        <x-button href="#" variant="tr-grey">Цены</x-button>
        <x-button href="#" variant="tr-grey">Контакты</x-button>
      </nav>
    </div>

    <div class="site-header__tools">
      <x-button variant="tr-grey" icon="search" icon-only aria-label="Поиск"></x-button>
      <x-button href="#" variant="tr-grey" icon="user" icon-only class="site-header__tool--desktop" aria-label="Личный кабинет"></x-button>

      <!-- cta: full label on desktop, short on mobile -->
      <x-button href="#" variant="blue" class="site-header__cta--desktop">Оставить заявку</x-button>
      <x-button href="#" variant="blue" class="site-header__cta--mobile">Записаться</x-button>

      <!-- burger — mobile only -->
      <x-button variant="blue" icon="burger" icon-only
                class="site-header__tool--mobile"
                aria-label="Меню" aria-controls="main-menu" aria-expanded="false"></x-button>
    </div>
  </div>
</header>
