<!-- .its-opeka — animated gradient background section -->
<section class="its-opeka" data-section="its-opeka" data-its-opeka>
  <div class="its-opeka__sticky">
    <div class="its-opeka__frame">

      <!-- animated bg: 3 gradient layers + 5 blobs -->
      <div class="its-opeka__bg" aria-hidden="true">
        <div class="its-opeka__bg-layer its-opeka__bg-layer--1"></div>
        <div class="its-opeka__bg-layer its-opeka__bg-layer--2"></div>
        <div class="its-opeka__bg-layer its-opeka__bg-layer--3"></div>
        <div class="its-opeka__blob its-opeka__blob--a"></div>
        <div class="its-opeka__blob its-opeka__blob--b"></div>
        <div class="its-opeka__blob its-opeka__blob--c"></div>
        <div class="its-opeka__blob its-opeka__blob--d"></div>
        <div class="its-opeka__blob its-opeka__blob--e"></div>
      </div>

      <!-- watermark -->
      <p class="its-opeka__watermark" aria-hidden="true">Опека — это</p>

      <!-- scroll CTA -->
      <a href="#" class="its-opeka__scroll-btn">
        <span class="its-opeka__scroll-label">Смотреть<br />наши пансионаты</span>
        <span class="its-opeka__scroll-icon" aria-hidden="true">
          <svg class="its-opeka__scroll-chevron"><use href="#icon-chevron-down" /></svg>
        </span>
      </a>

    </div>
  </div>
</section>
